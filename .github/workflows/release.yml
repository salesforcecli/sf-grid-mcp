name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest    # OIDC trusted publishing requires npm 11.5.1+
      - run: npm ci
      - run: npm run build
      - run: npx vitest run
      - name: Determine dist-tag
        id: dist-tag
        # If the tag contains '-' (e.g. v0.1.0-beta.0), it's a prerelease — publish under 'beta'.
        # Otherwise, publish under 'latest'.
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
      - run: npm publish --access public --tag ${{ steps.dist-tag.outputs.tag }}
